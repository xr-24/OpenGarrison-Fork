on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Package Linux and Windows
        run: pwsh ./scripts/package.ps1 -Platforms linux-x64,win-x64 -SkipTests

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/OpenGarrison-Linux-x64.zip
            dist/OpenGarrison-Windows-x64.zip
